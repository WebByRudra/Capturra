<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Capturra</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/login.css">

</head>
<body class="bg-gray-50">

  <!-- Navbar -->
  <nav class="bg-white shadow-sm fixed w-full top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center">
          <div class="flex-shrink-0 flex items-center">
            <div class="w-8 h-8 gradient-bg rounded-lg flex items-center justify-center mr-3">
              <span class="text-white font-bold text-lg">C</span>
            </div>
            <div>
              <span class="text-2xl font-bold text-gray-900">Capturra</span>
              <div class="text-xs text-gray-500 -mt-1">Where Creators Shine</div>
            </div>
          </div>
        </div>
        <a href="2.html" class="text-gray-600 hover:text-gray-900 px-3 py-2 text-sm font-medium transition-colors">Back to Home</a>
      </div>
    </div>
  </nav>

  <!-- Login Form -->            
  <input id="username" name="username" type="text" required placeholder="Enter your username">
  <section class="min-h-screen flex flex-col justify-center py-12 sm:px-6 lg:px-8 pt-20">
    <div class="sm:mx-auto sm:w-full sm:max-w-md text-center">
      <div class="w-16 h-16 gradient-bg rounded-2xl flex items-center justify-center mx-auto mb-6">
        <span class="text-white font-bold text-2xl">C</span>
      </div>
      <h2 class="text-3xl font-bold text-gray-900 mb-2">Welcome back</h2>
      <p class="text-gray-600">Sign in to your Capturra account</p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
      <div class="bg-white py-8 px-4 shadow-xl rounded-2xl sm:px-10">
        <form id="loginForm" method="post" class="space-y-5">
          <div>
            <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email</label>
            <input id="email" name="email" type="text" required placeholder="Enter your email"
              class="appearance-none block w-full px-4 py-3 border border-gray-300 rounded-lg placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-colors"/>
          </div>

          <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
            <input id="password" name="password" type="password" required placeholder="Enter your password"
              class="appearance-none block w-full px-4 py-3 border border-gray-300 rounded-lg placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-colors"/>
          </div>

          <div class="flex items-center justify-between">
            <div class="flex items-center">
              <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-purple-600 focus:ring-purple-500 border-gray-300 rounded"/>
              <label for="remember-me" class="ml-2 block text-sm text-gray-700">Remember me</label>
            </div>
            <div class="text-sm">
              <a href="#" class="font-medium text-purple-600 hover:text-purple-500 transition-colors">Forgot your password?</a>
            </div>
          </div>

          <button type="submit" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-lg text-white gradient-bg hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-purple-500 transition-opacity">
            Sign In
          </button>
        </form>

        <div class="mt-6 text-center">
          <p class="text-sm text-gray-600">
            Don't have an account?
            <a href="signup.html" class="font-medium text-purple-600 hover:text-purple-500 transition-colors ml-1">Sign Up</a>
          </p>
        </div>
      </div>
    </div>
  </section>

<!-- ✅ FIXED JAVASCRIPT FOR LOGIN -->
<script>
document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const formData = new FormData(this);

    fetch("http://localhost:8888/Capturra/api/login.php", {
        method: "POST",
        body: formData,
        credentials: "include"
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);

        if (data.success) {
            window.location.href = data.data.redirect_url;
        }
    })
    .catch(err => {
        console.log(err);
        alert("Login failed");
    });
});
</script>



</body>
</html>
